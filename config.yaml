# Настройки экспорта в 1С
# ========================

# Подключение к серверу 1С (OData API)
server:
  url: "https://1c.navus.me/base_rs/"
  username: "Zaykov Andrey"
  password: "19700214"

# Счёт бухгалтерского учёта по умолчанию (расчётный счёт)
счет_учета: "51"

# Правила определения вида операции по счёту контрагента
# Проверяются по порядку, первое совпадение выигрывает
# account_pattern: regex для номера счёта контрагента (18 цифр, нормализованный)
операции:
  # Пореска управа — уплата налога
  - account_pattern: "^820000000003000074$"
    вид_операции: "Уплата налога"
    счет_дебета: "69.20.1"
    вид_налога: "Прочие налоги и сборы"
    вид_обязательства: "Налог"
    статья_расходов: "Прочие налоги и сборы"
    статья_ддс: "Прочие налоги и сборы"

  # Hipotekarna Banka (фонд) — уплата взносов
  - account_pattern: "^520000000093910043$"
    вид_операции: "Уплата налога"
    счет_дебета: "69.20.6"
    вид_налога: "Прочие налоги и сборы"
    вид_обязательства: "Налог"
    статья_расходов: "Прочие налоги и сборы"
    статья_ддс: "Прочие налоги и сборы"

  # Фонд — уплата взносов
  - account_pattern: "^510000000000010516$"
    вид_операции: "Уплата налога"
    счет_дебета: "69.20.7"
    вид_налога: "Прочие налоги и сборы"
    вид_обязательства: "Налог"
    статья_расходов: "Прочие налоги и сборы"
    статья_ддс: "Прочие налоги и сборы"

  # Фонд 2
  - account_pattern: "^510000000914800929$"
    вид_операции: "Уплата налога"
    счет_дебета: "69.20.8"
    вид_налога: "Прочие налоги и сборы"
    вид_обязательства: "Налог"
    статья_расходов: "Прочие налоги и сборы"
    статья_ддс: "Прочие налоги и сборы"

  # 907... — внутренний счёт банка → комиссия банка
  - account_pattern: "^907"
    вид_операции: "Комиссия банка"
    счет_дебета: "91.02"
    статья_расходов: "Расходы на услуги банков"
    статья_ддс: "Расходы на услуги банков"

